name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Required so scripts/git-last-modified can see full history.
          fetch-depth: 0

      - name: Install soupault
        run: |
          set -eux
          SOUPAULT_VERSION="5.3.0"
          curl -fsSL -o soupault.tar.gz \
            "https://github.com/PataphysicalSociety/soupault/releases/download/${SOUPAULT_VERSION}/soupault-${SOUPAULT_VERSION}-linux-x86_64.tar.gz"
          tar xzf soupault.tar.gz
          sudo mv "soupault-${SOUPAULT_VERSION}-linux-x86_64/soupault" /usr/local/bin/
          soupault --version

      - name: Install pandoc
        run: |
          set -eux
          PANDOC_VERSION="3.10"
          curl -fsSL -o pandoc.tar.gz \
            "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-linux-amd64.tar.gz"
          tar xzf pandoc.tar.gz
          sudo mv "pandoc-${PANDOC_VERSION}/bin/pandoc" /usr/local/bin/
          pandoc --version

      # Rust toolchain for the share-image generator (scripts/share-images).
      # takumi's MSRV is 1.91; pin a recent stable.
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Cache the cargo registry and the tool's target dir so the takumi
      # dependency tree is only compiled from scratch on the first run (or when
      # scripts/share-images/Cargo.lock changes).
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: scripts/share-images

      - name: Build
        run: soupault

      # Generate per-post share images into build/og/. Must run after soupault
      # (consumes index.json, writes into build/).
      - name: Generate share images
        run: scripts/build-share-images.sh

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
