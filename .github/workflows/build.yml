name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Required so scripts/git-last-modified can see full history.
          fetch-depth: 0

      - name: Set up soupault
        uses: ./.github/actions/setup-soupault

      - name: Set up pandoc
        uses: ./.github/actions/setup-pandoc

      - name: Set up ImageMagick
        uses: ./.github/actions/setup-imagemagick

      # Build the site. OG_IMAGES=1 turns on ImageMagick share-card rendering
      # (off by default, so local builds and the nightly validation build skip
      # it); the og-image widget generates build/og/*.png during the build.
      - name: Build
        run: soupault
        env:
          OG_IMAGES: "1"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
