name: Validate pages

# Builds the site and runs the smolweb-validator against every generated HTML
# file. We use a fork (https://codeberg.org/chopfitzroy/smolweb-validator) that
# accepts file:// URLs, so we validate the built HTML straight from disk without
# serving anything over HTTP. Results are summarised in a sticky PR comment and
# a failing file blocks the merge.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so scripts/git-last-modified can read commit dates
          # during the build.
          fetch-depth: 0

      - name: Set up soupault
        uses: ./.github/actions/setup-soupault

      - name: Set up pandoc
        uses: ./.github/actions/setup-pandoc

      - name: Set up ImageMagick
        uses: ./.github/actions/setup-imagemagick

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # Fork of the upstream validator that accepts file:// URLs, so we can
      # validate the built HTML directly from disk without a web server.
      - name: Build the smolweb-validator
        run: |
          set -eux
          git clone --depth 1 \
            https://codeberg.org/chopfitzroy/smolweb-validator.git /tmp/smolweb-validator
          cd /tmp/smolweb-validator
          ./build.sh

      - name: Build the site
        run: soupault

      - name: Validate built pages
        id: validate
        run: |
          set -euo pipefail

          # Validate every HTML file soupault wrote under build/ via a file://
          # URL. smolweb-validate exits non-zero only for genuine errors
          # (invalid HTML or a failing CSS grade); warnings are reported but do
          # not fail the run. We stream each result to the Actions log AND
          # accumulate a markdown report that a later step posts as a PR
          # comment. We deliberately do NOT exit non-zero here: the comment must
          # be posted first (see the "Enforce validation result" step).
          body="$(mktemp)"
          scanned=0
          errored=0

          # -print0/read -d '' keeps paths with spaces intact; sorted for a
          # stable comment ordering.
          while IFS= read -r -d '' file; do
            scanned=$((scanned + 1))
            # build/index.html -> / ; build/foo/index.html -> /foo/
            rel="${file#build}"
            case "$rel" in
              */index.html) url="${rel%index.html}" ;;
              *)            url="$rel" ;;
            esac
            abs="$(realpath "$file")"

            echo "::group::Validating ${url}"
            # Run from the validator dir so its relative classpath resolves,
            # while still validating the site file by absolute path.
            status=0
            output="$(
              cd /tmp/smolweb-validator \
                && ./smolweb-validate "file://${abs}" --verbose
            )" || status=$?
            echo "$output"
            echo "::endgroup::"

            if [ "$status" -eq 0 ]; then
              echo "✅ ${url} passed"
              icon="✅"
            else
              echo "❌ ${url} failed validation"
              icon="❌"
              errored=$((errored + 1))
            fi

            {
              echo "<details><summary>${icon} <code>${url}</code></summary>"
              echo
              echo '```'
              echo "$output"
              echo '```'
              echo
              echo "</details>"
              echo
            } >> "$body"
          done < <(find build -type f -name '*.html' -print0 | sort -z)

          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if [ "$errored" -eq 0 ]; then
            summary="✅ ${scanned}/${scanned} files scanned, 0 with errors."
          else
            summary="❌ ${scanned}/${scanned} files scanned, ${errored} with errors."
          fi

          # Compose the final report: hidden marker (so the comment step can
          # find and update the same comment), heading, summary, run link, then
          # per-file details.
          report="$(mktemp)"
          {
            echo "<!-- smolweb-validation -->"
            echo "## 🧪 smolweb validation"
            echo
            echo "$summary"
            echo
            echo "[View full validation output](${run_url})"
            echo
            cat "$body"
          } >> "$report"

          echo "report=$report" >> "$GITHUB_OUTPUT"
          echo "errored=$errored" >> "$GITHUB_OUTPUT"

      # Post (or update) a single sticky comment on the PR with the results.
      # `--edit-last --create-if-none` keeps one comment that we edit on each
      # push instead of adding a new comment per run. Runs whenever the validate
      # step produced a report (i.e. the build didn't fail before it),
      # regardless of pass/fail.
      - name: Comment validation results on PR
        if: always() && steps.validate.outputs.report != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file "${{ steps.validate.outputs.report }}" \
            --edit-last \
            --create-if-none

      # Fail the job (blocking the merge) only after the comment is posted.
      - name: Enforce validation result
        if: steps.validate.outputs.errored != '0'
        run: exit 1
