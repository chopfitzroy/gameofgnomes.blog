[settings]
  site_dir = "site"
  build_dir = "build"

  default_template_file = "templates/main.html"
  default_content_selector = "main"

  doctype = "<!DOCTYPE html>"
  clean_urls = true

  page_file_extensions = ["html", "htm", "adoc"]

  plugin_discovery = true
  plugin_dirs = ["plugins"]

# Compile AsciiDoc source files to HTML with Pandoc before soupault parses
# them (replaces the previous built-in Markdown rendering). Soupault appends
# the page file path to this command and reads the resulting HTML from stdout.
# Pandoc renders the AsciiDoc document's first `==` section title as the
# page's <h1>, with `===`/`====` becoming <h2>/<h3>.
[preprocessors]
  adoc = "pandoc -f asciidoc -t html5"

[custom_options]
  # Used by the atom plugin to build absolute feed URLs.
  site_url = "https://gameofgnomes.blog"

# Use the first <h1> of each page as the <title>
[widgets.page-title]
  widget = "title"
  selector = "h1"
  default = "Game of Gnomes"

# Insert a <p><time class="note-date" datetime="...">...</time></p> block
# directly after the first `<h1>` of each note, so the date renders
# visually right under the page title. Runs on the preprocessed HTML
# (Pandoc output), before parsing. Source lives in hooks/pre-parse.lua.
#
# Scoped with path_regex so it runs on every note (any .adoc under site/)
# except the home page (site/index.adoc).
[hooks.pre-parse]
  path_regex = '\.adoc$'
  exclude_page = "index.adoc"
  file = "hooks/pre-parse.lua"

# After the build, render per-post share/OG images into build/og/ using
# ImageMagick (via scripts/share-image.sh). Runs once at the end with the
# full site index available. Source lives in hooks/post-build.lua.
[hooks.post-build]
  file = "hooks/post-build.lua"

# Build an index of every page except the home page.
[index]
  # Skip the home page itself -- it's where the index view is rendered,
  # not a note.
  exclude_page = "index.adoc"

  sort_by = "date"
  sort_type = "calendar"
  sort_descending = true

  # Parse ISO dates like 2026-04-26 (%F == %Y-%m-%d).
  date_formats = ["%F"]

  # Required for the atom plugin.
  dump_json = "index.json"

[index.fields.title]
  selector = ["h1"]
  required = true

[index.fields.date]
  selector = ["time.note-date"]
  extract_attribute = "datetime"
  fallback_to_content = true

# Pretty date for display on the index page. Sourced from the element's
# inner text, which the pre-parse hook set to "Apr 26, 2026".
[index.fields.date_pretty]
  selector = ["time.note-date"]

# Lightweight excerpt for the atom feed. First <p> of each note.
[index.fields.excerpt]
  selector = ["p"]

# Render the index into #index on site/index.md.
[index.views.index]
  index_selector = "#index"
  index_template = """
  <ul class="index">
  {% for e in entries %}
    <li class="index-item">
      <a class="index-link" href="{{ e.url }}">{{ e.title }}</a>
      {% if e.date %}
        <time class="index-date" datetime="{{ e.date }}">{{ e.date_pretty }}</time>
      {% endif %}
    </li>
  {% endfor %}
  </ul>
  """

# Inject OpenGraph/Twitter share-image meta tags into every page's <head>,
# pointing at the per-post cards generated into build/og/ by the post-build
# hook (source: plugins/og-image.lua).
[widgets.og-image]
  widget = "og-image"

# Inject a GoatCounter tracking pixel into every page. The `p` value is
# derived from the source .md file name (see plugins/goatcounter.lua):
#   site/session-prep.md -> ?p=/session-prep
#   site/index.md        -> ?p=/
[widgets.goatcounter]
  widget = "goatcounter"
  endpoint = "https://otis.goatcounter.com/count"

# Append a "View source" link to the bottom of every note, pointing at the
# post's source .adoc on GitHub (plugins/source-link.lua). Skips the home
# page since it isn't a note.
[widgets.source-link]
  widget = "source-link"
  path_regex = '\.adoc$'
  exclude_page = "index.adoc"

# Atom feed (plugins/atom.lua, vendored from soupault-website, MIT).
[widgets.atom]
  widget = "atom"
  page = "index.adoc"        # Attach to the home page so it runs once.

  feed_file = "atom.xml"
  feed_author = "Otis Sutton"
  feed_author_email = "chopfitzroy@gmail.com"
  feed_title = "Game of Gnomes"
  feed_subtitle = "A blog about game mastering"
  feed_logo = ""
  delete_elements = ["a"]    # Strip links from excerpts.
